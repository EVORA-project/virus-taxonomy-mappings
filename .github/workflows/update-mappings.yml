name: Update Mappings

on:
  # Run weekly on Mondays at 00:00 UTC
  schedule:
    - cron: '0 0 * * 1'
  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-shards:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    env:
      SHARD_COUNT: 8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --frozen

      - name: Generate shard
        run: |
          mkdir -p mappings/shards
          uv run python src/map.py \
            --output mappings/shards/ictv_ncbitaxon_exact.shard-${{ matrix.shard }}.sssom.tsv \
            --existing mappings/ictv_ncbitaxon_exact.sssom.tsv \
            --new-only \
            --shard-index ${{ matrix.shard }} \
            --shard-count ${SHARD_COUNT} \
            --request-timeout 30 \
            --max-retries 5 \
            --backoff-factor 1

      - name: Upload shard artifact
        uses: actions/upload-artifact@v4
        with:
          name: mapping-shard-${{ matrix.shard }}
          path: mappings/shards/ictv_ncbitaxon_exact.shard-${{ matrix.shard }}.sssom.tsv
          if-no-files-found: error

  merge-mappings:
    runs-on: ubuntu-latest
    needs: generate-shards
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --frozen

      - name: Sync with branch head
        run: |
          git fetch origin ${{ github.ref_name }}
          git checkout ${{ github.ref_name }}
          git reset --hard origin/${{ github.ref_name }}

      - name: Download shard artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: mapping-shard-*
          path: mappings/shards
          merge-multiple: true

      - name: Merge shards
        run: |
          uv run python src/merge_mappings.py \
            --input-glob 'mappings/shards/*.sssom.tsv' \
            --existing mappings/ictv_ncbitaxon_exact.sssom.tsv \
            --output mappings/ictv_ncbitaxon_exact.sssom.tsv

      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code mappings/ictv_ncbitaxon_exact.sssom.tsv || \
            echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mappings/ictv_ncbitaxon_exact.sssom.tsv
          git commit -m "update virus taxonomy mappings"
          git status --short
          git pull --rebase --autostash origin ${{ github.ref_name }}
          git push
