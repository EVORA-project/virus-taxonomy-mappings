name: Update Mappings

on:
  # Run weekly on Mondays at 00:00 UTC
  schedule:
    - cron: '0 0 * * 1'
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      recheck_existing_labels:
        description: 'Requery labels already represented in the existing SSSOM to backfill missing multi-matches'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  generate-shards:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    env:
      SHARD_COUNT: 8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --frozen

      - name: Generate shard
        run: |
          mkdir -p mappings/shards
          EXTRA_ARGS=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.recheck_existing_labels }}" = "true" ]; then
            EXTRA_ARGS="--recheck-existing-labels"
          fi
          uv run python src/map.py \
            --output mappings/shards/ictv_ncbitaxon_exact.shard-${{ matrix.shard }}.sssom.tsv \
            --existing mappings/ictv_ncbitaxon_exact.sssom.tsv \
            --new-only \
            $EXTRA_ARGS \
            --shard-index ${{ matrix.shard }} \
            --shard-count ${SHARD_COUNT} \
            --request-timeout 30 \
            --max-retries 5 \
            --backoff-factor 1

      - name: Upload shard artifact
        uses: actions/upload-artifact@v7
        with:
          name: mapping-shard-${{ matrix.shard }}
          path: mappings/shards/ictv_ncbitaxon_exact.shard-${{ matrix.shard }}.sssom.tsv
          if-no-files-found: error

  merge-mappings:
    runs-on: ubuntu-latest
    needs: generate-shards
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --frozen

      - name: Sync with branch head
        run: |
          git fetch origin ${{ github.ref_name }}
          git checkout ${{ github.ref_name }}
          git reset --hard origin/${{ github.ref_name }}

      - name: Download shard artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: mapping-shard-*
          path: mappings/shards
          merge-multiple: true

      - name: Merge shards
        run: |
          uv run python src/merge_mappings.py \
            --input-glob 'mappings/shards/*.sssom.tsv' \
            --existing mappings/ictv_ncbitaxon_exact.sssom.tsv \
            --output mappings/ictv_ncbitaxon_exact.sssom.tsv

      - name: Check for changes
        id: git-check
        run: |
          if git diff --exit-code mappings/ictv_ncbitaxon_exact.sssom.tsv; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mappings/ictv_ncbitaxon_exact.sssom.tsv
          git commit -m "update virus taxonomy mappings"
          git status --short
          git pull --rebase --autostash origin ${{ github.ref_name }}
          git push

          
    outputs:
      changed: ${{ steps.git-check.outputs.changed }}

  create-release:
    runs-on: ubuntu-latest
    needs: merge-mappings
    if: needs.merge-mappings.outputs.changed == 'true'
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref_name }}
          
      - name: Fetch all releases to determine version
        id: version
        run: |
          # Try to get the latest release
          LATEST_RELEASE=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "")
          
          if [ -z "$LATEST_RELEASE" ]; then
            # No releases exist, create the first one
            NEXT_VERSION="release-1"
          else
            # Extract the number from the latest release tag (e.g., "release-5" -> 5)
            LATEST_NUM=$(echo "$LATEST_RELEASE" | sed 's/release-//')
            NEXT_NUM=$((LATEST_NUM + 1))
            NEXT_VERSION="release-${NEXT_NUM}"
          fi
          
          echo "version=${NEXT_VERSION}" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest commit info
        id: commit-info
        run: |
          COMMIT_SHA=$(git rev-parse --short HEAD)
          COMMIT_MSG=$(git log -1 --format=%B)
          echo "sha=${COMMIT_SHA}" >> $GITHUB_OUTPUT
          echo "message=${COMMIT_MSG}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: mappings/ictv_ncbitaxon_exact.sssom.tsv
          tag_name: ${{ steps.version.outputs.version }}
          name: Virus Taxonomy Mappings Update
          body: |
            Automated release of updated virus taxonomy mappings
            
            Commit: ${{ steps.commit-info.outputs.sha }}
            Message: ${{ steps.commit-info.outputs.message }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
